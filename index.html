<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Nomads Ltd | Creating and Reinventing Apps for All!</title>
    <style>
        /* Base Styles - Clean solid background */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fdfdfd; /* Clean, slightly off-white background */
            color: #1a0f3c;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
        }

        /* Banner Header - Reduced by 50% */
        header {
            width: 100%;
            text-align: center;
            padding: 3rem 0 1rem;
        }

        .header-banner {
            max-width: 50%; /* Size reduced by half */
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* Main Content Container */
        main {
            width: 100%;
            max-width: 900px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem 2rem 4rem;
        }

        /* Centralized Laptop - Increased by 100% (From 250px to 500px) */
        .central-laptop {
            width: 500px; 
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto 3rem auto;
        }

        /* Prominent Tagline - One Line, Same Color */
        .tagline {
            font-size: 2.2rem;
            font-weight: 700;
            color: #0ea5e9; /* Unified light blue color */
            margin-bottom: 2.5rem;
            text-align: center;
            white-space: nowrap; /* Forces text to stay on one line */
            letter-spacing: -0.5px;
        }

        /* Address Formatting: Directly on background, left-aligned text in a centered block */
        .address-container {
            display: inline-block;
            text-align: left;
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 1.5rem;
        }

        .blue-line {
            color: #0ea5e9; /* Light blue */
        }

        .orange-line {
            color: #ea580c; /* Orange */
        }

        /* Clickable Surround for Email */
        .email-button {
            display: inline-block;
            padding: 12px 28px;
            margin: 1rem 0 2rem;
            background-color: transparent;
            border: 2px solid #ea580c; /* Orange surround */
            border-radius: 8px;
            color: #ea580c;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.2s ease;
        }

        .email-button:hover {
            background-color: #ea580c;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(234, 88, 12, 0.2);
        }

        /* Company Number */
        .company-number {
            font-size: 1rem;
            color: #6b7280;
            text-align: center;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .tagline {
                font-size: 1.5rem;
                white-space: normal; /* Allows tagline to stack on small phones to prevent screen breaking */
            }
            .header-banner {
                max-width: 80%; /* Ensures banner doesn't get too tiny on mobile */
            }
            .central-laptop {
                width: 90%;
            }
        }
    </style>
</head>
<body>

    <header>
        <img src="global-nomads-banner.png" alt="Global Nomads Ltd Banner" class="header-banner">
    </header>

    <main>
        <img src="retro-laptop.png" alt="Retro Laptop" class="central-laptop">

        <div class="tagline">
            Creating and Reinventing Apps for All!
        </div>

        <div class="address-container">
            <span class="blue-line">167-169, Great Portland Street</span><br>
            <span class="orange-line">5th Floor</span><br>
            <span class="blue-line">London,</span> <span class="orange-line">W1W 5PF.</span><br>
            <span class="blue-line">UK</span>
        </div>
        
        <a href="mailto:info@globalnomads.co.uk" class="email-button">info@globalnomads.co.uk</a>
        
        <div class="company-number">
            Companies House Number: 13058694
        </div>
    </main>

</body>
</html>
