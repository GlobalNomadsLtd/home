<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Nomads Ltd | Creating and Reinventing Apps for All!</title>
    <style>
        /* Base Dark Theme Styles */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #05080a; /* Deep dark background to match the banner edge */
            color: #d1d5db; /* Light grey text for readability */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Banner Header */
        header {
            width: 100%;
            background-color: #000000;
            text-align: center;
            border-bottom: 1px solid #1a2a30;
        }

        .banner-img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* Main Content Container */
        main {
            flex: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 4rem 2rem;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Prominent Tagline */
        .tagline {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 300;
            color: #7cf1f4; /* Glowing cyan matching the logo */
            margin-bottom: 4rem;
            text-shadow: 0 0 10px rgba(124, 241, 244, 0.2);
            line-height: 1.4;
        }

        /* Address Formatting: Centered container, left-aligned text */
        .address-container {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .address-content {
            text-align: left;
            font-size: 1.1rem;
            line-height: 1.8;
            background: rgba(255, 255, 255, 0.02);
            padding: 2.5rem 3.5rem;
            border-radius: 8px;
            border-left: 3px solid #7cf1f4;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .address-content strong {
            color: #ffffff;
            font-size: 1.3rem;
            letter-spacing: 0.5px;
        }

        .address-content a {
            color: #7cf1f4;
            text-decoration: none;
            transition: color 0.2s ease, text-shadow 0.2s ease;
        }

        .address-content a:hover {
            color: #ffffff;
            text-shadow: 0 0 8px rgba(124, 241, 244, 0.6);
        }

        .company-number {
            margin-top: 1.5rem;
            font-size: 0.95rem;
            color: #88929b;
        }

    </style>
</head>
<body>

    <header>
        <img src="banner.jpg" alt="Global Nomads Ltd Banner" class="banner-img">
    </header>

    <main>
        <div class="tagline">
            Creating and Reinventing Apps for All!
        </div>

        <div class="address-container">
            <div class="address-content">
                <strong>Global Nomads Ltd</strong><br>
                167-169, Great Portland Street<br>
                5th Floor<br>
                London,<br>
                W1W 5PF.<br>
                UK<br><br>
                
                <a href="mailto:info@globalnomads.co.uk">info@globalnomads.co.uk</a><br>
                
                <div class="company-number">
                    Companies House Number: 13058694
                </div>
            </div>
        </div>
    </main>

</body>
</html>
