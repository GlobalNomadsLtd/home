<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Nomads Ltd | Creating and Reinventing Apps for All!</title>
    <style>
        /* Base Styles - Clean solid background */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fdfdfd;
            color: #1a0f3c;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Banner Header - Maintained at 50% */
        header {
            width: 100%;
            text-align: center;
            padding: 3rem 0 1rem;
        }

        .header-banner {
            max-width: 50%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* Main Layout - 3 Column Setup for Symmetrical Images */
        main {
            width: 100%;
            max-width: 1400px; /* Widened to fit the side images comfortably */
            margin: 0 auto;
            padding: 2rem 2rem 4rem;
            box-sizing: border-box;
            flex: 1;
        }

        .content-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
            width: 100%;
        }

        /* Side Image Containers - Centralized in their space */
        .flank {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .side-image {
            width: 100%;
            max-width: 350px; /* Controls how large the side images get */
            height: auto;
            display: block;
        }

        .image-right {
            transform: scaleX(-1); /* Flips the right image for perfect symmetry */
        }

        /* Center Text Content */
        .center-text {
            flex: 1.5; /* Gives the text slightly more room than the images */
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* Prominent Tagline - One Line, Same Color */
        .tagline {
            font-size: 2.2rem;
            font-weight: 700;
            color: #0ea5e9; /* Unified light blue color */
            margin-bottom: 2.5rem;
            white-space: nowrap; /* Forces text to stay on one line */
            letter-spacing: -0.5px;
        }

        /* Address Formatting */
        .address-container {
            display: inline-block;
            text-align: left; /* Keeps the text aligned left within its center block */
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 1.5rem;
        }

        .blue-line {
            color: #0ea5e9;
        }

        .orange-line {
            color: #ea580c;
        }

        /* Clickable Surround for Email */
        .email-button {
            display: inline-block;
            padding: 12px 28px;
            margin: 1rem 0 2rem;
            background-color: transparent;
            border: 2px solid #ea580c;
            border-radius: 8px;
            color: #ea580c;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.2s ease;
        }

        .email-button:hover {
            background-color: #ea580c;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(234, 88, 12, 0.2);
        }

        /* Company Number */
        .company-number {
            font-size: 1rem;
            color: #6b7280;
        }

        /* Mobile Responsiveness */
        @media (max-width: 1024px) {
            .tagline {
                font-size: 1.8rem;
            }
            .side-image {
                max-width: 250px;
            }
        }

        @media (max-width: 768px) {
            .content-wrapper {
                flex-direction: column; /* Stacks everything vertically on phones */
            }
            .tagline {
                font-size: 1.5rem;
                white-space: normal; /* Allows tagline to wrap on small screens so it doesn't break */
            }
            .header-banner {
                max-width: 80%;
            }
            .flank {
                margin: 2rem 0; /* Adds spacing when stacked */
            }
            .image-right {
                transform: none; /* Removes flip on mobile stacking */
            }
        }
    </style>
</head>
<body>

    <header>
        <img src="global-nomads-banner.png" alt="Global Nomads Ltd Banner" class="header-banner">
    </header>

    <main>
        <div class="content-wrapper">
            
            <div class="flank">
                <img src="retro-label.png" alt="Retro Label Side" class="side-image">
            </div>

            <div class="center-text">
                <div class="tagline">
                    Creating and Reinventing Apps for All!
                </div>

                <div class="address-container">
                    <span class="blue-line">167-169, Great Portland Street</span><br>
                    <span class="orange-line">5th Floor</span><br>
                    <span class="blue-line">London,</span><br>
                    <span class="orange-line">W1W 5PF.</span><br>
                    <span class="blue-line">UK</span>
                </div>
                
                <a href="mailto:info@globalnomads.co.uk" class="email-button">info@globalnomads.co.uk</a>
                
                <div class="company-number">
                    Companies House Number: 13058694
                </div>
            </div>

            <div class="flank">
                <img src="retro-label.png" alt="Retro Label Side" class="side-image image-right">
            </div>

        </div>
    </main>

</body>
</html>
